<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twin Blaster Web Game</title>
  <style>
    body {
      margin: 0;
      background-color: #0b0f19;
      color: white;
      text-align: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas {
      background-color: #1a2235;
      border: 2px solid #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
      margin-top: 20px;
    }
    p { color: #888; }
  </style>
</head>
<body>

  <h2>Twin Blaster Survival</h2>
  <p>Move: <strong>Left/Right Arrows</strong> | Shoot: <strong>Spacebar</strong></p>
  
  <canvas id="gameCanvas" width="500" height="600"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Player object (The Gunslinger)
    const player = { x: 225, y: 530, width: 50, height: 50, speed: 6, dx: 0 };
    
    // Game arrays and variables
    const bullets = [];
    const enemies = [];
    let score = 0;
    let gameOver = false;
    let frameCount = 0;
    
    // Listen for keyboard input
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') player.dx = -player.speed;
      if (e.key === 'ArrowRight') player.dx = player.speed;
      if (e.key === ' ' || e.key === 'Spacebar') shoot();
    });
    
    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') player.dx = 0;
    });
    
    // Function to fire twin lasers
    function shoot() {
      if (gameOver) return;
      // Left blaster
      bullets.push({ x: player.x + 5, y: player.y, width: 4, height: 15, speed: 8 });
      // Right blaster
      bullets.push({ x: player.x + 41, y: player.y, width: 4, height: 15, speed: 8 });
    }
    
    // Main update logic (Movement & Collisions)
    function update() {
      if (gameOver) return;
      
      // 1. Move player and keep them inside the canvas
      player.x += player.dx;
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
      
      // 2. Move bullets up the screen
      for (let i = 0; i < bullets.length; i++) {
        bullets[i].y -= bullets[i].speed;
        // Remove bullet if it goes off screen
        if (bullets[i].y < 0) { 
            bullets.splice(i, 1); 
            i--; 
        }
      }
      
      // 3. Spawn enemies
      frameCount++;
      if (frameCount % 50 === 0) {
        const enemyX = Math.random() * (canvas.width - 40);
        enemies.push({ x: enemyX, y: -40, width: 40, height: 40, speed: 2 + Math.random() * 3 });
      }
      
      // 4. Move enemies down the screen
      for (let i = 0; i < enemies.length; i++) {
        enemies[i].y += enemies[i].speed;
        
        // Check collision: Enemy hits Player (Game Over)
        if (enemies[i].x < player.x + player.width &&
            enemies[i].x + enemies[i].width > player.x &&
            enemies[i].y < player.y + player.height &&
            enemies[i].y + enemies[i].height > player.y) {
          gameOver = true;
        }
        
        // Remove enemy if it passes the bottom of the screen
        if (enemies[i].y > canvas.height) { 
            enemies.splice(i, 1); 
            i--; 
        }
      }
      
      // 5. Check collision: Bullet hits Enemy
      for (let i = 0; i < enemies.length; i++) {
        for (let j = 0; j < bullets.length; j++) {
          let e = enemies[i];
          let b = bullets[j];
          
          if (e && b && 
              b.x < e.x + e.width && b.x + b.width > e.x &&
              b.y < e.y + e.height && b.y + b.height > e.y) {
            
            // Destroy both and increase score
            enemies.splice(i, 1);
            bullets.splice(j, 1);
            score += 10;
            i--; // Adjust enemy index after removal
            break; // Move to the next enemy
          }
        }
      }
    }
    
    // Drawing the graphics
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (gameOver) {
        ctx.fillStyle = '#ff3366';
        ctx.font = 'bold 40px sans-serif';
        ctx.fillText('GAME OVER', 125, 300);
        ctx.fillStyle = 'white';
        ctx.font = '20px sans-serif';
        ctx.fillText('Final Score: ' + score, 180, 340);
        ctx.fillText('Refresh page to restart', 150, 380);
        return;
      }
      
      // Draw Player (Cyan box)
      ctx.fillStyle = '#00ffff';
      ctx.fillRect(player.x, player.y, player.width, player.height);
      
      // Draw Bullets (Yellow)
      ctx.fillStyle = '#ffff00';
      bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
      
      // Draw Enemies (Red squares)
      ctx.fillStyle = '#ff3366';
      enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));
      
      // Draw Scoreboard
      ctx.fillStyle = 'white';
      ctx.font = '20px sans-serif';
      ctx.fillText('Score: ' + score, 10, 30);
    }
    
    // Game Loop
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    
    // Start game
    loop();
  </script>
</body>
</html>
