<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Vercel Snake Game</title>
  <style>
    body {
      background-color: #222;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    canvas {
      background-color: #000;
      border: 4px solid #4CAF50;
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
    }
    p { color: #888; }
  </style>
</head>
<body>

  <h1>Retro Snake</h1>
  <canvas width="400" height="400" id="gameCanvas"></canvas>
  <p>Use Arrow Keys to move</p>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const grid = 16;
    let count = 0;
    
    let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
    let apple = { x: 320, y: 320 };

    // Get random coordinates for the apple
    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    // Main game loop
    function loop() {
      requestAnimationFrame(loop);
      
      // Slow down the game loop to make it playable
      if (++count < 6) return; 
      count = 0;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move snake
      snake.x += snake.dx;
      snake.y += snake.dy;

      // Wrap snake position horizontally on edge of screen
      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;
      
      // Wrap snake position vertically on edge of screen
      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      // Keep track of where snake has been
      snake.cells.unshift({x: snake.x, y: snake.y});
      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      // Draw apple
      ctx.fillStyle = 'red';
      ctx.fillRect(apple.x, apple.y, grid-1, grid-1);

      // Draw snake
      ctx.fillStyle = 'lime';
      snake.cells.forEach(function(cell, index) {
        ctx.fillRect(cell.x, cell.y, grid-1, grid-1);

        // Snake eats apple
        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        // Check collision with all cells after this one (self collision)
        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            // Reset game
            snake.x = 160; 
            snake.y = 160; 
            snake.cells = []; 
            snake.maxCells = 4; 
            snake.dx = grid; 
            snake.dy = 0;
          }
        }
      });
    }

    // Listen to keyboard events to move the snake
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
      else if (e.key === 'ArrowUp' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
      else if (e.key === 'ArrowRight' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
      else if (e.key === 'ArrowDown' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    });

    // Start the game
    requestAnimationFrame(loop);
  </script>
</body>
</html>
